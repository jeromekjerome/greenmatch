<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platform Status — Hospitality Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f9fc; color: #1a202c; min-height: 100vh; }
    header { background: #1a202c; color: #fff; padding: 1.5rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header span { font-size: 0.85rem; color: #a0aec0; }
    .container { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    .overall { border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 2rem; font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; }
    .overall.operational { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
    .overall.degraded    { background: #fff5f5; border: 1px solid #feb2b2; color: #9b2c2c; }
    .overall.loading     { background: #ebf8ff; border: 1px solid #90cdf4; color: #2c5282; }
    .card { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 0.75rem; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; }
    .card .name { font-weight: 600; font-size: 0.95rem; }
    .card .url  { font-size: 0.78rem; color: #718096; margin-top: 2px; }
    .badge { font-size: 0.78rem; font-weight: 700; padding: 0.3rem 0.7rem; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge.up      { background: #f0fff4; color: #276749; }
    .badge.down    { background: #fff5f5; color: #9b2c2c; }
    .badge.loading { background: #ebf8ff; color: #2c5282; }
    .down-since { font-size: 0.75rem; color: #e53e3e; margin-top: 3px; }
    footer { text-align: center; color: #a0aec0; font-size: 0.78rem; margin: 2.5rem 0 1.5rem; }
    .refresh-hint { text-align: center; color: #718096; font-size: 0.8rem; margin-bottom: 1.5rem; }
    #last-updated { font-weight: 500; color: #4a5568; }
  </style>
</head>
<body>
  <header>
    <h1>Hospitality Platform — Status</h1>
    <span>Live health check</span>
  </header>

  <div class="container">
    <div id="overall" class="overall loading">
      <span>⏳</span> <span>Checking services…</span>
    </div>

    <div id="services"></div>

    <p class="refresh-hint">Auto-refreshes every 60 seconds &nbsp;|&nbsp; Last updated: <span id="last-updated">—</span></p>
  </div>

  <footer>Hospitality Platform &copy; 2026 Jerome W. Dewald. All rights reserved.</footer>

  <script>
    async function load() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();

        const overall = document.getElementById('overall');
        if (data.overall === 'operational') {
          overall.className = 'overall operational';
          overall.innerHTML = '<span>✅</span> <span>All systems operational</span>';
        } else {
          overall.className = 'overall degraded';
          overall.innerHTML = '<span>🔴</span> <span>One or more services degraded</span>';
        }

        const container = document.getElementById('services');
        container.innerHTML = data.services.map(s => `
          <div class="card">
            <div>
              <div class="name">${s.name}</div>
              <div class="url">${s.url}</div>
              ${s.downSince ? `<div class="down-since">Down since ${new Date(s.downSince).toUTCString()}</div>` : ''}
            </div>
            <span class="badge ${s.status}">${s.status === 'up' ? 'Operational' : 'Outage'}</span>
          </div>
        `).join('');

        document.getElementById('last-updated').textContent = new Date(data.ts).toLocaleTimeString();
      } catch (err) {
        document.getElementById('overall').className = 'overall degraded';
        document.getElementById('overall').innerHTML = '<span>⚠️</span> <span>Could not load status data</span>';
      }
    }

    load();
    setInterval(load, 60_000);
  </script>
</body>
</html>
